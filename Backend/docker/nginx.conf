server {
    listen 10000;
    server_name _;
    root /app/public;
    index index.php;

     # ── CORS headers ────────────────────────────────────────────────────────
    set $cors_origin "";
    if ($http_origin = "https://community-sharing-platform.vercel.app") {
        set $cors_origin $http_origin;
    }
    if ($http_origin = "http://localhost:5173") {
        set $cors_origin $http_origin;
    }
    if ($http_origin = "http://127.0.0.1:5173") {
        set $cors_origin $http_origin;
    }

     # Handle OPTIONS preflight — respond directly from nginx
    if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Requested-With, X-XSRF-TOKEN" always;
        add_header Access-Control-Max-Age 1728000 always;
        add_header Content-Length 0;
        add_header Content-Type text/plain;
        return 204;
    }

    # Add CORS headers to all other responses too
    add_header Access-Control-Allow-Origin $cors_origin always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Requested-With, X-XSRF-TOKEN" always;

    # Handle Laravel routes
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Pass PHP files to php-fpm
    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 60;

        # Also add CORS inside fastcgi block
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Requested-With, X-XSRF-TOKEN" always;
    }

    # Security - block .env and hidden files
    location ~ /\. {
        deny all;
    }

    client_max_body_size 10M;
}